services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: orch8
      POSTGRES_USER: orch8
      POSTGRES_PASSWORD: orch8
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orch8"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
