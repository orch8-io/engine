[advisories]
ignore = [
    # proc-macro-error2 is unmaintained (no vulnerability); pulled in via
    # tabled -> tabled_derive in orch8-cli. Remove once tabled drops it.
    "RUSTSEC-2026-0173",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unlicense",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "MIT-0",
    "BSD-1-Clause",
    "MPL-2.0",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-mobile"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-publisher"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-api"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-cli"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-engine"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-grpc"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-server"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-storage"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-push"

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8-types"

[[licenses.exceptions]]
allow = ["GPL-2.0-only"]
crate = "ittapi"

[[licenses.exceptions]]
allow = ["GPL-2.0-only"]
crate = "ittapi-sys"

[[licenses.exceptions]]
allow = ["LGPL-2.1-or-later"]
crate = "r-efi"

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
