[advisories]
ignore = [
    # RUSTSEC-2026-0194/0195: quadratic attribute scan and unbounded
    # namespace-declaration allocation, both in quick-xml's low-level
    # NsReader/Attributes API. Pulled in transitively via
    # object_store -> quick-xml, which object_store's own Cargo.toml pins to
    # "^0.40.1" (last fixed in 0.41.0). object_store only calls the
    # high-level `quick_xml::de::from_reader` serde API to parse S3 XML
    # responses (not NsReader/Attributes), so neither advisory's code path is
    # reachable here. Remove once object_store bumps its quick-xml
    # requirement past 0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "ISC",
    "Unlicense",
    "Zlib",
    "0BSD",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "MIT-0",
    "BSD-1-Clause",
    "MPL-2.0",
]
confidence-threshold = 0.8

[[licenses.exceptions]]
allow = ["BUSL-1.1"]
crate = "orch8"

