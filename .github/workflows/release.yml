name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify CI Status
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Check CI status
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA=$(git rev-parse HEAD)
          CI_WORKFLOW="ci.yml"
          # Wait up to 15 minutes for the CI workflow to complete
          for i in $(seq 1 90); do
            RUN=$(gh api "repos/$REPO/actions/workflows/$CI_WORKFLOW/runs?head_sha=$SHA&per_page=1" \
              --jq '.workflow_runs[0] | "\(.status) \(.conclusion)"' 2>/dev/null || echo "")
            STATUS=$(echo "$RUN" | cut -d' ' -f1)
            CONCLUSION=$(echo "$RUN" | cut -d' ' -f2)
            if [ "$STATUS" = "completed" ]; then
              if [ "$CONCLUSION" = "success" ]; then
                echo "CI passed for $SHA"
                exit 0
              else
                echo "CI failed ($CONCLUSION) for $SHA — aborting release"
                exit 1
              fi
            fi
            echo "CI status: ${STATUS:-waiting} (attempt $i/90)"
            sleep 10
          done
          echo "ERROR: CI not completed after 15 minutes — aborting release"
          exit 1

  build:
    name: Build ${{ matrix.target }}
    needs: [verify]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # v2.7.8
        with:
          key: ${{ matrix.target }}

      - name: Install protoc
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            sudo apt-get update && sudo apt-get install -y protobuf-compiler
          else
            brew install protobuf
          fi

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin orch8-server --bin orch8

      - name: Package
        env:
          TARGET: ${{ matrix.target }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DIR="orch8-${TAG}-${TARGET}"
          mkdir "$DIR"
          cp "target/${TARGET}/release/orch8-server" "$DIR/"
          cp "target/${TARGET}/release/orch8" "$DIR/"
          tar -czf "${DIR}.tar.gz" "$DIR"
          shasum -a 256 "${DIR}.tar.gz" > "${DIR}.tar.gz.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: binaries-${{ matrix.target }}
          path: |
            orch8-*.tar.gz
            orch8-*.tar.gz.sha256

  docker:
    name: Docker Image
    needs: [verify]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Extract version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/orch8-io/engine:${{ steps.version.outputs.tag }}
            ghcr.io/orch8-io/engine:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, docker]
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: binaries-*
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.3.2
        with:
          generate_release_notes: true
          files: |
            artifacts/orch8-*.tar.gz
            artifacts/orch8-*.tar.gz.sha256

  install-sh-smoke:
    name: install.sh Smoke Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    needs: [release]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run install.sh to a temp dir
        env:
          INSTALL_DIR: ${{ runner.temp }}/orch8-bin
        run: |
          mkdir -p "$INSTALL_DIR"
          # The release was just created — give GitHub's API a moment to surface it.
          # Up to 2 minutes (12 x 10s) to handle API propagation delays.
          for i in $(seq 1 12); do
            if curl -sSL https://api.github.com/repos/orch8-io/engine/releases/latest 2>/dev/null \
              | grep -q '"tag_name"'; then
              break
            fi
            echo "Waiting for release to propagate... (attempt $i/12)"
            sleep 10
          done
          sh ./install.sh --dir "$INSTALL_DIR"

      - name: Verify installed binaries
        env:
          INSTALL_DIR: ${{ runner.temp }}/orch8-bin
        run: |
          "$INSTALL_DIR/orch8" --version
          "$INSTALL_DIR/orch8-server" --help | head -5
